<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Game - Donut Edition</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 50%, #f093fb 100%);
            animation: gradientShift 15s ease infinite;
            background-size: 200% 200%;
        }

        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 95%;
        }

        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 10px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .subtitle {
            text-align: center;
            color: #666;
            margin-bottom: 30px;
            font-size: 1.1em;
        }

        .controls {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 30px;
            padding: 20px;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            border-radius: 15px;
        }

        .control-group {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .control-group label {
            font-weight: bold;
            color: #333;
            font-size: 1.05em;
        }

        .difficulty-buttons {
            display: flex;
            gap: 10px;
        }

        .difficulty-buttons button {
            flex: 1;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
            font-size: 0.95em;
        }

        .difficulty-buttons button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        .difficulty-buttons button.active {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border-color: #667eea;
        }

        #colorPicker {
            width: 100%;
            height: 50px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
        }

        .game-area {
            display: flex;
            justify-content: center;
            margin-bottom: 20px;
        }

        #gameCanvas {
            border: 3px solid #333;
            background: linear-gradient(135deg, #ffecd2 0%, #fcb69f 100%);
            border-radius: 10px;
            display: block;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        button {
            padding: 12px 30px;
            font-size: 1em;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        #startBtn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            min-width: 150px;
        }

        #startBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }

        #pauseBtn {
            background: #ff9a56;
            color: white;
            min-width: 150px;
        }

        #pauseBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 154, 86, 0.4);
        }

        #resetBtn {
            background: #ff6b6b;
            color: white;
            min-width: 150px;
        }

        #resetBtn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(255, 107, 107, 0.4);
        }

        .stats {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 15px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .stat-value {
            font-size: 2em;
            font-weight: bold;
            margin-top: 5px;
        }

        .instructions {
            margin-top: 20px;
            padding: 15px;
            background: #fffacd;
            border-radius: 10px;
            border-left: 4px solid #ffd700;
            font-size: 0.95em;
            color: #333;
        }

        .instructions h3 {
            color: #ff9a56;
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐍 Snake Game</h1>
        <p class="subtitle">Eat donuts and grow your snake!</p>

        <div class="controls">
            <div class="control-group">
                <label>Difficulty Level</label>
                <div class="difficulty-buttons">
                    <button onclick="setDifficulty('easy')" class="active">Easy</button>
                    <button onclick="setDifficulty('medium')">Medium</button>
                    <button onclick="setDifficulty('hard')">Hard</button>
                </div>
            </div>
            <div class="control-group">
                <label>Snake Color</label>
                <input type="color" id="colorPicker" value="#00ff00">
            </div>
        </div>

        <div class="game-area">
            <canvas id="gameCanvas" width="400" height="400"></canvas>
        </div>

        <div class="button-group">
            <button id="startBtn" onclick="startGame()">Start Game</button>
            <button id="pauseBtn" onclick="togglePause()">Pause</button>
            <button id="resetBtn" onclick="resetGame()">Reset</button>
        </div>

        <div class="stats">
            <div class="stat-box">
                <div class="stat-label">Score</div>
                <div class="stat-value" id="score">0</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Length</div>
                <div class="stat-value" id="length">1</div>
            </div>
            <div class="stat-box">
                <div class="stat-label">Level</div>
                <div class="stat-value" id="difficulty">Easy</div>
            </div>
        </div>

        <div class="instructions">
            <h3>How to Play:</h3>
            <p>🎮 Use <strong>Arrow Keys</strong> or <strong>WASD</strong> to control your snake<br>
            🍩 Eat donuts to grow and gain points<br>
            ⚠️ Don't hit the walls or yourself!<br>
            ⏸️ Press Pause to pause/resume the game</p>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Game variables
        let gridSize = 20;
        let snake = [{x: 10, y: 10}];
        let direction = {x: 1, y: 0};
        let nextDirection = {x: 1, y: 0};
        let food = {x: Math.floor(Math.random() * (canvas.width / gridSize)), y: Math.floor(Math.random() * (canvas.height / gridSize))};
        let score = 0;
        let gameRunning = false;
        let gamePaused = false;
        let difficulty = 'easy';
        let gameSpeed = 100;

        const difficulties = {
            easy: { speed: 150, label: 'Easy' },
            medium: { speed: 100, label: 'Medium' },
            hard: { speed: 65, label: 'Hard' }
        };

        // Keyboard controls
        document.addEventListener('keydown', (e) => {
            if (!gameRunning && e.key !== 'p' && e.key !== 'P') return;

            switch(e.key.toLowerCase()) {
                case 'arrowup':
                case 'w':
                    if (direction.y === 0) nextDirection = {x: 0, y: -1};
                    e.preventDefault();
                    break;
                case 'arrowdown':
                case 's':
                    if (direction.y === 0) nextDirection = {x: 0, y: 1};
                    e.preventDefault();
                    break;
                case 'arrowleft':
                case 'a':
                    if (direction.x === 0) nextDirection = {x: -1, y: 0};
                    e.preventDefault();
                    break;
                case 'arrowright':
                case 'd':
                    if (direction.x === 0) nextDirection = {x: 1, y: 0};
                    e.preventDefault();
                    break;
                case 'p':
                    if (gameRunning) togglePause();
                    break;
            }
        });

        function setDifficulty(level) {
            if (gameRunning) return;
            difficulty = level;
            gameSpeed = difficulties[level].speed;
            document.getElementById('difficulty').textContent = difficulties[level].label;
            
            document.querySelectorAll('.difficulty-buttons button').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.classList.add('active');
        }

        function startGame() {
            if (gameRunning) return;
            gameRunning = true;
            gamePaused = false;
            document.getElementById('startBtn').textContent = 'Playing...';
            document.getElementById('pauseBtn').disabled = false;
            gameLoop();
        }

        function togglePause() {
            if (!gameRunning) return;
            gamePaused = !gamePaused;
            document.getElementById('pauseBtn').textContent = gamePaused ? 'Resume' : 'Pause';
            if (!gamePaused) {
                gameLoop();
            }
        }

        function resetGame() {
            snake = [{x: 10, y: 10}];
            direction = {x: 1, y: 0};
            nextDirection = {x: 1, y: 0};
            score = 0;
            gameRunning = false;
            gamePaused = false;
            food = generateFood();
            updateStats();
            document.getElementById('startBtn').textContent = 'Start Game';
            document.getElementById('pauseBtn').textContent = 'Pause';
            draw();
        }

        function generateFood() {
            let newFood;
            let collision = true;
            while (collision) {
                newFood = {
                    x: Math.floor(Math.random() * (canvas.width / gridSize)),
                    y: Math.floor(Math.random() * (canvas.height / gridSize))
                };
                collision = snake.some(segment => segment.x === newFood.x && segment.y === newFood.y);
            }
            return newFood;
        }

        function updateStats() {
            document.getElementById('score').textContent = score;
            document.getElementById('length').textContent = snake.length;
        }

        function gameLoop() {
            if (!gameRunning || gamePaused) return;

            setTimeout(() => {
                update();
                draw();
                gameLoop();
            }, gameSpeed);
        }

        function update() {
            direction = nextDirection;

            const head = {x: snake[0].x + direction.x, y: snake[0].y + direction.y};

            // Check wall collision
            if (head.x < 0 || head.x >= canvas.width / gridSize || head.y < 0 || head.y >= canvas.height / gridSize) {
                endGame();
                return;
            }

            // Check self collision
            if (snake.some(segment => segment.x === head.x && segment.y === head.y)) {
                endGame();
                return;
            }

            snake.unshift(head);

            // Check food collision
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                food = generateFood();
            } else {
                snake.pop();
            }

            updateStats();
        }

        function endGame() {
            gameRunning = false;
            document.getElementById('startBtn').textContent = 'Game Over! Start Again';
            alert(`Game Over! Final Score: ${score}\nSnake Length: ${snake.length}`);
        }

        function draw() {
            // Clear canvas with gradient background
            const gradient = ctx.createLinearGradient(0, 0, canvas.width, canvas.height);
            gradient.addColorStop(0, '#ffecd2');
            gradient.addColorStop(1, '#fcb69f');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Draw grid
            ctx.strokeStyle = 'rgba(255, 255, 255, 0.2)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= canvas.width; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i <= canvas.height; i += gridSize) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }

            // Draw snake
            const snakeColor = document.getElementById('colorPicker').value;
            snake.forEach((segment, index) => {
                if (index === 0) {
                    // Head
                    ctx.fillStyle = snakeColor;
                    ctx.fillRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);
                    // Eyes
                    ctx.fillStyle = 'white';
                    const eyeSize = 3;
                    if (direction.x === 1) {
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 6, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 12, segment.y * gridSize + 11, eyeSize, eyeSize);
                    } else if (direction.x === -1) {
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 6, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 5, segment.y * gridSize + 11, eyeSize, eyeSize);
                    } else if (direction.y === -1) {
                        ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + 5, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 11, segment.y * gridSize + 5, eyeSize, eyeSize);
                    } else {
                        ctx.fillRect(segment.x * gridSize + 6, segment.y * gridSize + 12, eyeSize, eyeSize);
                        ctx.fillRect(segment.x * gridSize + 11, segment.y * gridSize + 12, eyeSize, eyeSize);
                    }
                } else {
                    // Body
                    ctx.fillStyle = snakeColor;
                    ctx.globalAlpha = 1 - (index / snake.length) * 0.5;
                    ctx.fillRect(segment.x * gridSize + 2, segment.y * gridSize + 2, gridSize - 4, gridSize - 4);
                    ctx.globalAlpha = 1;
                }
            });

            // Draw food (donut)
            drawDonut(food.x * gridSize + gridSize / 2, food.y * gridSize + gridSize / 2, gridSize / 2);
        }

        function drawDonut(x, y, radius) {
            // Outer circle
            ctx.fillStyle = '#ff9a56';
            ctx.beginPath();
            ctx.arc(x, y, radius - 2, 0, Math.PI * 2);
            ctx.fill();

            // Inner hole
            ctx.fillStyle = '#ffecd2';
            ctx.beginPath();
            ctx.arc(x, y, radius / 2, 0, Math.PI * 2);
            ctx.fill();

            // Sprinkles
            ctx.strokeStyle = '#ff6b9d';
            ctx.lineWidth = 2;
            for (let i = 0; i < 8; i++) {
                const angle = (i / 8) * Math.PI * 2;
                const x1 = x + Math.cos(angle) * (radius - 3);
                const y1 = y + Math.sin(angle) * (radius - 3);
                const x2 = x + Math.cos(angle) * (radius + 2);
                const y2 = y + Math.sin(angle) * (radius + 2);
                ctx.beginPath();
                ctx.moveTo(x1, y1);
                ctx.lineTo(x2, y2);
                ctx.stroke();
            }
        }

        // Initialize
        draw();
        updateStats();
    </script>
</body>
</html>
